name: Deploy to Server

# GitHub Actions 탭에서 "Run workflow" 버튼으로 수동 배포
on:
  workflow_dispatch:
    inputs:
      environment:
        description: '배포 환경'
        required: true
        default: 'production'
        type: choice
        options:
          - production

jobs:
  deploy:
    name: Deploy to GCP (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH 키 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: server 파일 rsync 복사 (.env 제외)
        run: |
          rsync -avz --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            server/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/app/react/songform/server/

      - name: Docker 빌드 및 재시작
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "=== [1/3] node-server 이미지 빌드 ==="
            cd /app
            docker compose build node-server

            echo "=== [2/3] DB 마이그레이션 ==="
            docker compose run --rm node-server npm run migrate

            echo "=== [3/3] node-server 재시작 ==="
            docker compose up -d node-server

            echo "=== 배포 완료 ==="
            docker ps
