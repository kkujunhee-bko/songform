name: Deploy to Server

# GitHub Actions 탭에서 "Run workflow" 버튼으로 수동 배포
on:
  workflow_dispatch:
    inputs:
      environment:
        description: '배포 환경'
        required: true
        default: 'production'
        type: choice
        options:
          - production

jobs:
  deploy:
    name: Deploy to GCP (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH 키 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: client 빌드
        run: |
          cd client
          npm ci
          npm run build

      - name: server 파일 rsync 복사 (.env, uploads 제외)
        run: |
          rsync -avz --exclude='.env' --exclude='uploads/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            server/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/app/react/songform/server/

      - name: client dist rsync 복사
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            client/dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/app/react/songform/client/dist/

      - name: Docker 빌드 및 재시작
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "=== [1/4] node-server 이미지 빌드 ==="
            cd /app
            docker compose build node-server

            echo "=== [2/4] DB 마이그레이션 ==="
            docker compose run --rm node-server npm run migrate

            echo "=== [3/4] node-server 재시작 ==="
            docker compose up -d node-server

            echo "=== [4/4] react-app 컨테이너에 client 배포 ==="
            docker cp /app/react/songform/client/dist/. react-app:/usr/share/nginx/html/

            echo "=== 배포 완료 ==="
            docker ps
