name: Deploy to Server

# GitHub Actions 탭에서 "Run workflow" 버튼으로 수동 배포
on:
  workflow_dispatch:
    inputs:
      environment:
        description: '배포 환경'
        required: true
        default: 'production'
        type: choice
        options:
          - production

jobs:
  deploy:
    name: Deploy to GCP (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            echo "=== [1/4] 저장소 최신화 ==="
            cd /app/react/songform
            git pull origin main

            echo "=== [2/4] node-server 이미지 빌드 ==="
            cd /app
            docker-compose build node-server

            echo "=== [3/4] DB 마이그레이션 ==="
            docker-compose run --rm node-server npm run migrate

            echo "=== [4/4] node-server 재시작 ==="
            docker-compose up -d node-server

            echo "=== 배포 완료 ==="
            docker ps
